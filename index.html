<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#5a0718">
  <meta name="description" content="Aybüke & Seley düğün davetiyesi">
  <title>Aybüke & Seley | Düğün Davetiyesi</title>

  <style>
    :root{
      --burgundy:#5a0718;
      --burgundy-dark:#2b030b;
      --cream:#f6efe5;
      --gold:#c6a15b;
      --text:#4a1420;
      --white:#fffaf3;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:Georgia,"Times New Roman",serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%,rgba(255,255,255,.32),transparent 24%),
        linear-gradient(135deg,#2b030b,#6d0d24 45%,#2b030b);
      overflow-x:hidden;
    }

    .sparkles{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
      z-index:0;
    }

    .sparkles span{
      position:absolute;
      width:4px;
      height:4px;
      background:rgba(255,230,170,.75);
      border-radius:50%;
      animation:float 8s linear infinite;
      box-shadow:0 0 10px rgba(255,230,170,.8);
    }

    @keyframes float{
      from{transform:translateY(105vh) scale(.4);opacity:0}
      10%{opacity:1}
      to{transform:translateY(-10vh) scale(1.2);opacity:0}
    }

    .opening{
      position:fixed;
      inset:0;
      z-index:20;
      display:grid;
      place-items:center;
      padding:24px;
      background:linear-gradient(135deg,#25030a,#660e22);
      transition:opacity .8s ease,visibility .8s ease;
    }

    .opening.hidden{
      opacity:0;
      visibility:hidden;
    }

    .envelope{
      width:min(88vw,420px);
      aspect-ratio:1.55/1;
      position:relative;
      background:linear-gradient(145deg,#7d102c,#4d0717);
      border-radius:18px;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
    }

    .envelope:before,
    .envelope:after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:75%;
      background:linear-gradient(145deg,#650a20,#3e0512);
      clip-path:polygon(0 100%,50% 20%,100% 100%);
    }

    .flap{
      position:absolute;
      inset:0 0 auto 0;
      height:62%;
      background:linear-gradient(145deg,#8e1734,#56091b);
      clip-path:polygon(0 0,100% 0,50% 100%);
      transform-origin:top;
      z-index:4;
      transition:transform 1s ease;
    }

    .seal{
      position:absolute;
      left:50%;
      top:53%;
      transform:translate(-50%,-50%);
      width:92px;
      height:92px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%,#9a2842,#4f0717 70%);
      border:4px solid #33030d;
      box-shadow:0 8px 18px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.08);
      display:grid;
      place-items:center;
      z-index:7;
      color:#e7c98b;
      font-size:26px;
      letter-spacing:2px;
      font-weight:bold;
    }

    .open-btn{
      position:absolute;
      left:50%;
      bottom:26px;
      transform:translateX(-50%);
      z-index:9;
      border:1px solid rgba(255,255,255,.3);
      background:rgba(255,250,243,.95);
      color:var(--burgundy);
      padding:13px 22px;
      border-radius:999px;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 8px 25px rgba(0,0,0,.25);
    }

    .opening.opened .flap{transform:rotateX(180deg)}
    .opening.opened .seal{animation:sealAway .6s forwards}
    @keyframes sealAway{to{transform:translate(-50%,-50%) scale(.2);opacity:0}}

    .page{
      position:relative;
      z-index:1;
      width:min(100%,900px);
      margin:auto;
      padding:34px 18px 70px;
      opacity:0;
      transform:translateY(25px);
      transition:1s ease;
    }

    .page.visible{
      opacity:1;
      transform:none;
    }

    .hero{
      text-align:center;
      color:var(--cream);
      margin-bottom:22px;
    }

    .hero .small{
      letter-spacing:.25em;
      font-size:.82rem;
      text-transform:uppercase;
      opacity:.85;
    }

    .hero h1{
      margin:12px 0 6px;
      font-size:clamp(2.3rem,7vw,5rem);
      font-weight:400;
      font-style:italic;
      text-shadow:0 8px 25px rgba(0,0,0,.25);
    }

    .hero p{
      margin:0 auto;
      max-width:620px;
      line-height:1.7;
      opacity:.92;
    }

    .invitation-wrap{
      background:rgba(255,250,243,.96);
      border-radius:26px;
      padding:12px;
      box-shadow:0 28px 80px rgba(0,0,0,.35);
      border:1px solid rgba(198,161,91,.45);
    }

    .invitation{
      display:block;
      width:100%;
      height:auto;
      border-radius:18px;
    }

    .details{
      margin-top:22px;
      background:rgba(255,250,243,.96);
      border-radius:24px;
      padding:24px;
      box-shadow:0 20px 55px rgba(0,0,0,.25);
      border:1px solid rgba(198,161,91,.4);
      text-align:center;
    }

    .details h2{
      margin:0 0 16px;
      font-size:1.5rem;
      font-weight:500;
    }

    .info-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
      margin:18px 0 22px;
    }

    .info{
      padding:14px 10px;
      border:1px solid rgba(90,7,24,.15);
      border-radius:16px;
      background:#fffaf3;
    }

    .info b{display:block;margin-bottom:5px}
    .info span{font-size:.92rem;line-height:1.4}

    .buttons{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:12px 14px;
      border-radius:14px;
      text-decoration:none;
      border:none;
      cursor:pointer;
      font:inherit;
      font-weight:700;
      background:var(--burgundy);
      color:white;
      box-shadow:0 10px 24px rgba(90,7,24,.25);
    }

    .btn.secondary{
      background:#fffaf3;
      color:var(--burgundy);
      border:1px solid rgba(90,7,24,.25);
      box-shadow:none;
    }

    .footer{
      color:var(--cream);
      text-align:center;
      margin-top:24px;
      opacity:.8;
      font-size:.9rem;
    }

    @media (max-width:700px){
      .info-grid,.buttons{grid-template-columns:1fr}
      .page{padding-top:24px}
      .details{padding:18px}
    }

    @media (prefers-reduced-motion:reduce){
      *{animation:none!important;transition:none!important}
    }
  </style>
</head>

<body>
  <div class="sparkles" aria-hidden="true">
    <span style="left:8%;animation-delay:0s"></span>
    <span style="left:18%;animation-delay:2s"></span>
    <span style="left:31%;animation-delay:5s"></span>
    <span style="left:48%;animation-delay:1s"></span>
    <span style="left:62%;animation-delay:4s"></span>
    <span style="left:77%;animation-delay:6s"></span>
    <span style="left:91%;animation-delay:3s"></span>
  </div>

  <div class="opening" id="opening">
    <div class="envelope">
      <div class="flap"></div>
      <div class="seal">A·S</div>
      <button class="open-btn" id="openInvitation">Daveti Aç</button>
    </div>
  </div>

  <main class="page" id="page">
    <section class="hero">
      <div class="small">Düğün Davetiyesi</div>
      <h1>Aybüke &amp; Seley</h1>
      <p>Bu anlamlı günümüzde sizleri de aramızda görmekten kıvanç duyarız.</p>
    </section>

    <section class="invitation-wrap">
      <img class="invitation" src="davetiye.jpeg" alt="Aybüke ve Seley düğün davetiyesi">
    </section>

    <section class="details">
      <h2>Düğün Bilgileri</h2>

      <div class="info-grid">
        <div class="info">
          <b>📅 Tarih</b>
          <span>08 Ağustos 2026</span>
        </div>
        <div class="info">
          <b>🕖 Saat</b>
          <span>19:00</span>
        </div>
        <div class="info">
          <b>📍 Mekân</b>
          <span>Gönül Davet Salonu</span>
        </div>
      </div>

      <div class="buttons">
        <a class="btn" target="_blank" rel="noopener"
           href="https://www.google.com/maps/search/?api=1&query=G%C3%B6n%C3%BCl%20Davet%20Salonu%204.%20Levent%20Konaklar%20Mah.%20Me%C5%9Feli%20Sok.%20No%3A25%2FA%20Be%C5%9Fikta%C5%9F%20%C4%B0stanbul">
          📍 Yol Tarifi Al
        </a>

        <a class="btn secondary"
           href="data:text/calendar;charset=utf-8,BEGIN%3AVCALENDAR%0AVERSION%3A2.0%0ABEGIN%3AVEVENT%0ADTSTART%3A20260808T160000Z%0ADTEND%3A20260808T210000Z%0ASUMMARY%3AAyb%C3%BCke%20%26%20Seley%20D%C3%BC%C4%9F%C3%BCn%C3%BC%0ALOCATION%3AG%C3%B6n%C3%BCl%20Davet%20Salonu%2C%204.%20Levent%2C%20Be%C5%9Fikta%C5%9F%2F%C4%B0stanbul%0ADESCRIPTION%3ABu%20anlaml%C4%B1%20g%C3%BCn%C3%BCm%C3%BCzde%20sizleri%20de%20aram%C4%B1zda%20g%C3%B6rmekten%20k%C4%B1van%C3%A7%20duyar%C4%B1z.%0AEND%3AVEVENT%0AEND%3AVCALENDAR"
           download="aybuke-seley-dugun.ics">
          📅 Takvime Ekle
        </a>

        <button class="btn secondary" id="shareButton">💬 Paylaş</button>
      </div>
    </section>

    <div class="footer">Forever begins · 08.08.2026</div>
  </main>

  <script>
    const opening = document.getElementById("opening");
    const page = document.getElementById("page");
    const openButton = document.getElementById("openInvitation");
    const shareButton = document.getElementById("shareButton");

    openButton.addEventListener("click", () => {
      opening.classList.add("opened");
      setTimeout(() => {
        opening.classList.add("hidden");
        page.classList.add("visible");
      }, 850);
    });

    shareButton.addEventListener("click", async () => {
      const shareData = {
        title: "Aybüke & Seley Düğün Davetiyesi",
        text: "Bu anlamlı günümüzde sizleri de aramızda görmekten kıvanç duyarız.",
        url: window.location.href
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
        } else {
          await navigator.clipboard.writeText(window.location.href);
          shareButton.textContent = "✓ Link Kopyalandı";
          setTimeout(() => shareButton.textContent = "💬 Paylaş", 1800);
        }
      } catch (error) {
        console.log("Paylaşım iptal edildi.");
      }
    });
  </script>
</body>
</html>
